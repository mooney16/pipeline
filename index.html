<title>Ag Startup Engine &mdash; Deal Pipeline</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f0ec;color:#222;min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
#header{background:#fff;border-bottom:2px solid #3d7a52;padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.08)}
#logo{display:flex;align-items:center;gap:10px;text-decoration:none}
#logo svg{flex-shrink:0}
#logo-text{font-size:15px;font-weight:700;color:#1a3a26;line-height:1.2;white-space:nowrap}
#logo-text span{display:block;font-size:11px;font-weight:400;color:#3d7a52;letter-spacing:.04em}
#deal-badge{background:#3d7a52;color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:2px 9px;margin-left:4px;white-space:nowrap}
#header-spacer{flex:1}
#search-wrap{position:relative;flex-shrink:0}
#search{border:1.5px solid #d0d0cc;border-radius:20px;padding:6px 14px 6px 34px;font-size:13px;outline:none;width:220px;background:#f7f7f4;transition:border-color .15s}
#search:focus{border-color:#3d7a52;background:#fff}
#search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#888;pointer-events:none}

/* ── FILTER BAR ── */
#filter-bar{background:#fff;border-bottom:1px solid #e0e0dc;padding:8px 20px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;position:sticky;top:56px;z-index:99}
#filter-bar label{font-size:11px;font-weight:600;color:#666;margin-right:4px;text-transform:uppercase;letter-spacing:.05em}
.filter-btn{border:1.5px solid #d0d0cc;background:#fff;border-radius:20px;padding:4px 13px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:#444;white-space:nowrap}
.filter-btn:hover{border-color:#3d7a52;color:#3d7a52}
.filter-btn.active{background:#3d7a52;border-color:#3d7a52;color:#fff}

/* ── BOARD ── */
#board-wrap{flex:1;overflow-x:auto;padding:16px 20px 32px;display:flex;gap:14px;min-height:0}
.column{flex:0 0 260px;display:flex;flex-direction:column;background:#e4e4e0;border-radius:10px;overflow:hidden}
.col-header{padding:10px 14px 8px;display:flex;align-items:center;gap:8px;background:#e4e4e0;position:sticky;top:0}
.col-title{font-size:13px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.04em}
.col-count{background:#fff;border:1px solid #ccc;color:#555;font-size:11px;font-weight:700;border-radius:12px;padding:1px 7px;margin-left:auto}
.col-cards{flex:1;overflow-y:auto;padding:0 8px 10px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 180px)}
.col-cards::-webkit-scrollbar{width:4px}
.col-cards::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}

/* ── CARDS ── */
.card{background:#fff;border-radius:8px;padding:11px 12px 10px;cursor:pointer;transition:box-shadow .15s,transform .1s;border:1px solid #e8e8e4;position:relative}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);transform:translateY(-1px)}
.card-company{font-size:13px;font-weight:700;color:#111;line-height:1.3;margin-bottom:2px}
.card-founder{font-size:11px;color:#888;margin-bottom:5px}
.card-desc{font-size:11.5px;color:#555;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:7px}
.card-footer{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:4px}
.vtag{font-size:10px;font-weight:600;border-radius:10px;padding:2px 8px;border:1px solid transparent}
.vtag-Agtech,.vtag-AgTech{background:#e8f0eb;color:#2d6040;border-color:#c0d8c8}
.vtag-PrecisionAg{background:#e8eef8;color:#2c4e8a;border-color:#b8cce8}
.vtag-AnimalHealth{background:#fdf0e0;color:#8a5a0a;border-color:#e8d0a0}
.vtag-RegenerativeAg{background:#edf5e8;color:#3a6e22;border-color:#b8dca8}
.vtag-LivestockAnimalHealth{background:#f8ece8;color:#8a3a1a;border-color:#e0c0b0}
.vtag-Others,.vtag-null{background:#f0f0f0;color:#666;border-color:#d8d8d8}
.cohort-tag{font-size:10px;color:#999;margin-left:auto;white-space:nowrap}
.badge{font-size:10px;font-weight:600;border-radius:4px;padding:1px 6px;text-decoration:none}
.badge-deck{background:#e8f0eb;color:#2d6040;border:1px solid #b0cdb8}
.badge-brief{background:#e8eef8;color:#2c4e8a;border:1px solid #b0c4e0}
.badge-notes{background:#fdf0e0;color:#8a5a0a;border:1px solid #e0c888}
.no-results{padding:20px 14px;text-align:center;color:#aaa;font-size:12px}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:#fff;border-radius:12px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22);display:flex;flex-direction:column}
#modal-header{padding:18px 20px 12px;border-bottom:1px solid #eee;display:flex;align-items:flex-start;gap:10px}
#modal-title{flex:1}
#modal-company{font-size:17px;font-weight:800;color:#111;margin-bottom:3px}
#modal-founder{font-size:12px;color:#888}
#modal-close{background:none;border:none;font-size:20px;color:#aaa;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;margin-top:1px}
#modal-close:hover{color:#333}
#modal-body{padding:16px 20px}
.modal-row{margin-bottom:12px}
.modal-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:3px}
.modal-value{font-size:13px;color:#333;line-height:1.5}
.modal-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.modal-badge{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;text-decoration:none}
#modal-stage-section{padding:14px 20px 18px;border-top:1px solid #eee}
#modal-stage-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:8px}
#modal-stage-btns{display:flex;flex-wrap:wrap;gap:6px}
.stage-btn{border:1.5px solid #d0d0cc;background:#fff;border-radius:6px;padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:#444}
.stage-btn:hover{border-color:#3d7a52;color:#3d7a52}
.stage-btn.current{background:#3d7a52;border-color:#3d7a52;color:#fff;font-weight:700}
</style>
</head>

// ── State ──
let stageOverrides = {};
try { stageOverrides = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch(e){}
let activeFilter = "All";
let searchQuery = "";
let openDealId = null;

function getStage(deal) {
  return stageOverrides[deal.id] || deal.stage;
}

function setStage(dealId, stage) {
  stageOverrides[dealId] = stage;
  localStorage.setItem(LS_KEY, JSON.stringify(stageOverrides));
}

function matchesFilter(deal) {
  if (activeFilter === "All") return true;
  const allowed = FILTERS[activeFilter];
  if (!allowed) return true;
  return allowed.includes(deal.vertical);
}

function matchesSearch(deal) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return (deal.company||"").toLowerCase().includes(q)
      || (deal.founder||"").toLowerCase().includes(q)
      || (deal.description||"").toLowerCase().includes(q)
      || (deal.vertical||"").toLowerCase().includes(q);
}

function visibleDeals() {
  return DEALS.filter(d => matchesFilter(d) && matchesSearch(d));
}

function vtag(vertical) {
  const v = vertical || "null";
  const label = v === "null" ? "—" : v.replace(/([A-Z])/g,' $1').trim();
  return `<span class="vtag vtag-${v}">${label}</span>`;
}

function escHtml(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Render board ──
function renderBoard() {
  const board = document.getElementById("board-wrap");
  const visible = visibleDeals();

  board.innerHTML = "";
  STAGES.forEach(stage => {
    const stageDeals = visible.filter(d => getStage(d) === stage);
    const col = document.createElement("div");
    col.className = "column";
    col.innerHTML = `
      <div class="col-header">
        <span class="col-title">${escHtml(stage)}</span>
        <span class="col-count" id="cnt-${stage.replace(/\s/g,'_')}">${stageDeals.length}</span>
      </div>
      <div class="col-cards" id="col-${stage.replace(/\s/g,'_')}"></div>
    `;
    board.appendChild(col);

    const cardContainer = col.querySelector(".col-cards");
    if (stageDeals.length === 0) {
      cardContainer.innerHTML = `<div class="no-results">No deals</div>`;
    } else {
      stageDeals.forEach(deal => {
        cardContainer.appendChild(buildCard(deal));
      });
    }
  });

  // Update total badge
  document.getElementById("deal-badge").textContent = `${visible.length} deal${visible.length!==1?'s':''}`;
}

function buildCard(deal) {
  const div = document.createElement("div");
  div.className = "card";
  div.dataset.id = deal.id;

  let footer = "";
  if (deal.vertical) footer += vtag(deal.vertical);
  if (deal.cohort) footer += `<span class="cohort-tag">${escHtml(deal.cohort)}</span>`;
  if (deal.deck_url) footer += `<a class="badge badge-deck" href="${escHtml(deal.deck_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Deck</a>`;
  if (deal.brief_url) footer += `<a class="badge badge-brief" href="${escHtml(deal.brief_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Brief</a>`;
  if (deal.notes_url) footer += `<a class="badge badge-notes" href="${escHtml(deal.notes_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Notes</a>`;

  div.innerHTML = `
    <div class="card-company">${escHtml(deal.company)}</div>
    ${deal.founder ? `<div class="card-founder">${escHtml(deal.founder)}</div>` : ""}
    ${deal.description ? `<div class="card-desc">${escHtml(deal.description)}</div>` : ""}
    <div class="card-footer">${footer}</div>
  `;

  div.addEventListener("click", () => openModal(deal.id));
  return div;
}

// ── Modal ──
function openModal(dealId) {
  const deal = DEALS.find(d => d.id === dealId);
  if (!deal) return;
  openDealId = dealId;
  const currentStage = getStage(deal);

  document.getElementById("modal-company").textContent = deal.company || "";
  document.getElementById("modal-founder").textContent = deal.founder ? `Founded by ${deal.founder}` : "";
  document.getElementById("modal-vertical").innerHTML = deal.vertical ? vtag(deal.vertical) : "—";
  document.getElementById("modal-stage-cur").textContent = currentStage;
  document.getElementById("modal-cohort").textContent = deal.cohort || "—";
  document.getElementById("modal-desc").textContent = deal.description || "—";

  // docs
  const docsEl = document.getElementById("modal-docs");
  docsEl.innerHTML = "";
  if (deal.deck_url) {
    const a = document.createElement("a");
    a.className = "modal-badge badge-deck";
    a.href = deal.deck_url; a.target = "_blank"; a.rel = "noopener";
    a.textContent = "Deck"; docsEl.appendChild(a);
  }
  if (deal.brief_url) {
    const a = document.createElement("a");
    a.className = "modal-badge badge-brief";
    a.href = deal.brief_url; a.target = "_blank"; a.rel = "noopener";
    a.textContent = "Brief"; docsEl.appendChild(a);
  }
  if (deal.notes_url) {
    const a = document.createElement("a");
    a.className = "modal-badge badge-notes";
    a.href = deal.notes_url; a.target = "_blank"; a.rel = "noopener";
    a.textContent = "Notes"; docsEl.appendChild(a);
  }
  document.getElementById("mrow-docs").style.display = (deal.deck_url||deal.brief_url||deal.notes_url) ? "" : "none";

  // stage buttons
  const stagebtns = document.getElementById("modal-stage-btns");
  stagebtns.innerHTML = "";
  STAGES.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "stage-btn" + (s === currentStage ? " current" : "");
    btn.textContent = s;
    btn.addEventListener("click", () => {
      setStage(dealId, s);
      renderBoard();
      // update modal to reflect new stage
      document.getElementById("modal-stage-cur").textContent = s;
      stagebtns.querySelectorAll(".stage-btn").forEach(b => b.classList.toggle("current", b.textContent === s));
    });
    stagebtns.appendChild(btn);
  });

  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  openDealId = null;
}

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Filter buttons ──
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderBoard();
  });
});

// ── Search ──
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderBoard();
});

// ── Init ──
renderBoard();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASE Deal Flow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232638;
    --border: #2d3148;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #10b981;
    --amber: #f59e0b;
    --cyan: #06b6d4;
    --purple: #8b5cf6;
    --emerald: #059669;
    --pink: #ec4899;
    --slate: #64748b;
    --red: #ef4444;
    --radius: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .header-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .stat-chip strong { color: var(--text); }
  .stat-chip.new strong { color: var(--green); }
  #stageSummary { display: flex; gap: 6px; flex-wrap: wrap; }

  /* FILTERS */
  .filters {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    color: var(--text);
    font-size: 12px;
    width: 220px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-label { color: var(--muted); font-size: 12px; }

  /* BOARD */
  .board-wrap {
    flex: 1;
    overflow-x: auto;
    padding: 16px 12px;
  }
  .board {
    display: flex;
    gap: 12px;
    min-width: max-content;
    align-items: flex-start;
  }
  .column {
    width: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 140px);
  }
  .column-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .column-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    font-size: 12px;
  }
  .col-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--muted);
  }
  .column-cards {
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .column-cards.drag-over { background: rgba(59,130,246,0.08); }
  .empty-col { color: var(--muted); font-size: 11px; text-align: center; padding: 12px 0; }

  /* CARDS */
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    user-select: none;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card.dragging { opacity: 0.5; }
  .card-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
  .card-founder { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .card-desc {
    font-size: 11px; color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .card-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .card-date { font-size: 10px; color: var(--slate); margin-left: auto; }
  .deck-icon { font-size: 13px; text-decoration: none; }

  /* BADGES */
  .badge {
    display: inline-block;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .badge-PrecisionAg    { background: #1e3a5f; color: #60a5fa; }
  .badge-BiotechCropScience { background: #14532d; color: #4ade80; }
  .badge-ClimateAg      { background: #422006; color: #fb923c; }
  .badge-WaterTech      { background: #0c4a6e; color: #38bdf8; }
  .badge-SupplyChain    { background: #3b0764; color: #c084fc; }
  .badge-RegenerativeAg { background: #052e16; color: #34d399; }
  .badge-AnimalHealth   { background: #4a1942; color: #f0abfc; }
  .badge-AgTech         { background: #1e293b; color: #94a3b8; }
  .badge-cohort         { background: #1c1f2e; color: var(--muted); border: 1px solid var(--border); }

  /* DETAIL MODAL */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 480px;
    max-width: 95vw;
    max-height: 88vh;
    overflow-y: auto;
    padding: 24px;
  }
  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .close-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 20px; line-height: 1;
    padding: 2px 6px;
  }
  .close-btn:hover { color: var(--text); }
  .detail-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 8px 12px;
    margin-bottom: 16px;
  }
  .detail-label { color: var(--muted); font-size: 12px; align-self: center; }
  .detail-value { font-size: 12px; }
  .detail-value a { color: var(--accent); text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }
  select.dm-stage-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;
    width: 100%;
    cursor: pointer;
  }
  .detail-section { margin-bottom: 14px; }
  .detail-section label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .dm-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 7px 9px;
    font-size: 12px;
    resize: vertical;
    min-height: 70px;
    font-family: inherit;
  }
  .dm-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 5px 9px;
    font-size: 12px;
    font-family: inherit;
  }
  .save-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .btn-save {
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #fff; cursor: pointer;
    padding: 5px 14px; font-size: 12px;
  }
  .btn-save:hover { background: var(--accent-hover); }
  .save-indicator { font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }
  .log-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .log-list li { font-size: 11px; display: flex; gap: 8px; }
  .log-date { color: var(--muted); white-space: nowrap; }

  /* ADD DEAL MODAL */
  .add-modal { width: 420px; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 9px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row select.form-input { cursor: pointer; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted); cursor: pointer;
    padding: 6px 16px; font-size: 12px;
  }
  .btn-primary {
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #fff; cursor: pointer;
    padding: 6px 16px; font-size: 12px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .add-btn {
    background: var(--accent);
    border: none; border-radius: var(--radius);
    color: #fff; cursor: pointer;
    padding: 5px 14px; font-size: 12px;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>

<div class="header">
  <h1>ASE Deal Flow</h1>
  <div class="header-stats">
    <div class="stat-chip"><strong id="statTotal">397</strong> total</div>
    <div class="stat-chip new"><strong id="statNew">15</strong> this week</div>
    <div id="stageSummary"></div>
  </div>
  <button class="add-btn" onclick="openAddModal()">+ Add Deal</button>
</div>

<div class="filters">
  <span class="filter-label">Filter:</span>
  <input type="text" class="search-box" id="searchBox" placeholder="Search company, founder..." oninput="applyFilters()">
  <button class="filter-btn" id="btnAll" onclick="setStageFilter('all')">All Stages</button>
  <button class="filter-btn" id="btnThisWeek" onclick="toggleWeekFilter()">This Week</button>
  <select class="search-box" id="verticalFilter" onchange="applyFilters()" style="width:140px">
    <option value="">All Verticals</option>
    <option value="PrecisionAg">Precision Ag</option>
    <option value="BiotechCropScience">Biotech</option>
    <option value="Biotech/CropScience">Biotech</option>
    <option value="ClimateAg">Climate Ag</option>
    <option value="WaterTech">Water Tech</option>
    <option value="SupplyChain">Supply Chain</option>
    <option value="RegenerativeAg">Regen Ag</option>
    <option value="AnimalHealth">Animal Health</option>
    <option value="AgTech">AgTech</option>
  </select>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOverlay" onclick="closeDetailIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="dm-name"></div>
        <div class="modal-subtitle" id="dm-founder"></div>
      </div>
      <button class="close-btn" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="detail-grid">
      <span class="detail-label">Stage</span>
      <div class="detail-value">
        <select class="dm-stage-select" id="dm-stage" onchange="onStageChange()"></select>
      </div>
      <span class="detail-label">Vertical</span>
      <span class="detail-value" id="dm-vertical"></span>
      <span class="detail-label">Location</span>
      <span class="detail-value" id="dm-location"></span>
      <span class="detail-label">Cohort</span>
      <span class="detail-value" id="dm-cohort"></span>
      <span class="detail-label">Date Added</span>
      <span class="detail-value" id="dm-date"></span>
      <span class="detail-label">Source</span>
      <span class="detail-value" id="dm-source"></span>
      <span class="detail-label" id="dm-raise-label">Raise</span>
      <span class="detail-value" id="dm-raise"></span>
      <span class="detail-label" id="dm-links-label">Links</span>
      <span class="detail-value" id="dm-links"></span>
    </div>
    <div class="detail-section">
      <label>Description</label>
      <div class="detail-value" id="dm-desc" style="color:var(--muted);font-size:12px;line-height:1.5"></div>
    </div>
    <div class="detail-section">
      <label>Notes</label>
      <textarea class="dm-textarea" id="dm-notes" placeholder="Add notes..."></textarea>
      <div class="save-row">
        <button class="btn-save" onclick="saveNotes()">Save Notes</button>
        <span class="save-indicator" id="si-notes">Saved</span>
      </div>
    </div>
    <div class="detail-section">
      <label>Last Contact</label>
      <input type="date" class="dm-input" id="dm-last-contact">
      <div class="save-row">
        <button class="btn-save" onclick="saveLastContact()">Save Contact</button>
        <span class="save-indicator" id="si-contact">Saved</span>
      </div>
    </div>
    <div class="detail-section" id="dm-log-section">
      <label>Contact Log</label>
      <ul class="log-list" id="dm-log"></ul>
    </div>
  </div>
</div>

<!-- Add Deal Modal -->
<div class="overlay" id="addOverlay" onclick="closeAddIfBg(event)">
  <div class="modal add-modal">
    <div class="modal-header">
      <div class="modal-title">Add Deal</div>
      <button class="close-btn" onclick="closeAdd()">&#x2715;</button>
    </div>
    <div class="form-row"><label>Company Name *</label><input class="form-input" id="f-name" placeholder="Acme Ag"></div>
    <div class="form-row"><label>Founder Name</label><input class="form-input" id="f-founder" placeholder="Jane Smith"></div>
    <div class="form-row"><label>Founder Email</label><input class="form-input" id="f-email" type="email" placeholder="jane@acme.com"></div>
    <div class="form-row"><label>Description</label><input class="form-input" id="f-desc" placeholder="One-liner about the company"></div>
    <div class="form-row"><label>Vertical</label>
      <select class="form-input" id="f-vertical">
        <option value="">Select vertical</option>
        <option value="PrecisionAg">Precision Ag</option>
        <option value="BiotechCropScience">Biotech/Crop Science</option>
        <option value="ClimateAg">Climate Ag</option>
        <option value="WaterTech">Water Tech</option>
        <option value="SupplyChain">Supply Chain</option>
        <option value="RegenerativeAg">Regenerative Ag</option>
        <option value="AnimalHealth">Animal Health</option>
        <option value="AgTech">AgTech</option>
      </select>
    </div>
    <div class="form-row"><label>Stage</label>
      <select class="form-input" id="f-stage">
        <option>Pipeline</option><option>Meeting</option><option>IC Review</option>
        <option>Term Sheet</option><option>Portfolio</option><option>Passed</option><option>Later</option>
      </select>
    </div>
    <div class="form-row"><label>Cohort</label><input class="form-input" id="f-cohort" placeholder="2025"></div>
    <div class="form-row"><label>Location</label><input class="form-input" id="f-location" placeholder="Austin, TX"></div>
    <div class="form-row"><label>Source</label><input class="form-input" id="f-source" placeholder="Inbound, referral..."></div>
    <div class="form-row"><label>Deck URL</label><input class="form-input" id="f-deck" type="url" placeholder="https://..."></div>
    <div class="form-row"><label>LinkedIn</label><input class="form-input" id="f-linkedin" type="url" placeholder="https://linkedin.com/in/..."></div>
    <div class="form-row"><label>Raise</label><input class="form-input" id="f-raise" placeholder="$2M seed"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
      <button class="btn-primary" onclick="submitAddDeal()">Add Deal</button>
    </div>
  </div>
</div>

const STAGES = ['Pipeline','Meeting','IC Review','Term Sheet','Portfolio','Passed','Later'];
const STAGE_COLORS = {
  'Pipeline':   '#3b82f6',
  'Meeting':    '#8b5cf6',
  'IC Review':  '#f59e0b',
  'Term Sheet': '#10b981',
  'Later':      '#06b6d4',
  'Portfolio':  '#059669',
  'Passed':     '#ef4444',
};

// State
let allDeals = [];           // flat array
let filteredDeals = [];      // after filters
let currentDeal = null;
let currentIndex = null;
let dragSrcStage = null;
let dragSrcIndex = null;
let stageFilter = 'all';
let weekFilterOn = false;

// ---- INIT ----
function init() {
  allDeals = EMBEDDED_DEALS;
  renderStats();
  applyFilters();
}

// ---- STATS ----
function renderStats() {
  // Count per stage
  const stageSummary = document.getElementById('stageSummary');
  stageSummary.innerHTML = STAGES.map(s => {
    const c = allDeals.filter(d => d.stage === s).length;
    if (!c) return '';
    return `<div class="stat-chip"><strong style="color:${STAGE_COLORS[s]}">${c}</strong> ${s}</div>`;
  }).join('');
}

// ---- FILTERS ----
function setStageFilter(stage) {
  stageFilter = stage;
  document.getElementById('btnAll').classList.toggle('active', stage === 'all');
  applyFilters();
}

function toggleWeekFilter() {
  weekFilterOn = !weekFilterOn;
  document.getElementById('btnThisWeek').classList.toggle('active', weekFilterOn);
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const vertical = document.getElementById('verticalFilter').value;
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

  filteredDeals = allDeals.filter(d => {
    if (stageFilter !== 'all' && d.stage !== stageFilter) return false;
    if (weekFilterOn && d.date_added) {
      const da = new Date(d.date_added + 'T00:00:00');
      if (da < weekAgo) return false;
    } else if (weekFilterOn && !d.date_added) {
      return false;
    }
    if (vertical && d.vertical !== vertical) return false;
    if (q) {
      const hay = [d.company_name, d.founder_name, d.description, d.location, d.source].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  renderBoard();
  updateWeekCounter();
}

function updateWeekCounter() {
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const count = allDeals.filter(d => {
    if (!d.date_added) return false;
    const da = new Date(d.date_added + 'T00:00:00');
    return da >= weekAgo;
  }).length;
  document.getElementById('statNew').textContent = count;
  document.getElementById('statTotal').textContent = filteredDeals.length;
}

// ---- BOARD ----
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  STAGES.forEach(stage => {
    const deals = filteredDeals.filter(d => d.stage === stage);
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.stage = stage;

    const color = STAGE_COLORS[stage] || '#3b82f6';
    col.innerHTML = `
      <div class="column-header">
        <div class="column-title">
          <span class="col-dot" style="background:${color}"></span>
          ${stage}
        </div>
        <span class="count-badge">${deals.length}</span>
      </div>
      <div class="column-cards" id="col-${slugify(stage)}"
           ondragover="onDragOver(event)"
           ondragleave="onDragLeave(event)"
           ondrop="onDrop(event,'${stage}')">
        ${deals.length === 0 ? '<div class="empty-col">No deals</div>' : deals.map(d => cardHTML(d)).join('')}
      </div>
    `;
    board.appendChild(col);
  });

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend', onDragEnd);
  });
}

function slugify(s) { return s.toLowerCase().replace(/\s+/g,'_'); }

function verticalBadgeClass(v) {
  const map = {
    'PrecisionAg':'badge-PrecisionAg',
    'Biotech/CropScience':'badge-BiotechCropScience',
    'BiotechCropScience':'badge-BiotechCropScience',
    'ClimateAg':'badge-ClimateAg',
    'WaterTech':'badge-WaterTech',
    'SupplyChain':'badge-SupplyChain',
    'RegenerativeAg':'badge-RegenerativeAg',
    'AnimalHealth':'badge-AnimalHealth',
    'AgTech':'badge-AgTech',
  };
  return map[v] || 'badge-AgTech';
}

function verticalLabel(v) {
  const map = {
    'PrecisionAg':'Precision Ag',
    'Biotech/CropScience':'Biotech',
    'BiotechCropScience':'Biotech',
    'ClimateAg':'Climate Ag',
    'WaterTech':'Water Tech',
    'SupplyChain':'Supply Chain',
    'RegenerativeAg':'Regen Ag',
    'AnimalHealth':'Animal Health',
    'AgTech':'AgTech',
  };
  return map[v] || (v || 'AgTech');
}

function cardHTML(deal) {
  const idx = deal._index;
  const deckIcon = deal.deck_url
    ? `<a class="deck-icon" href="${deal.deck_url}" target="_blank" title="View Deck" onclick="event.stopPropagation()">&#128196;</a>`
    : '';
  const vertical = deal.vertical || '';
  const badgeClass = verticalBadgeClass(vertical);
  const cohortBadge = deal.cohort
    ? `<span class="badge badge-cohort">${deal.cohort}</span>` : '';
  const dateStr = deal.date_added ? formatDate(deal.date_added) : '';

  return `
    <div class="card"
         draggable="true"
         data-index="${idx}"
         data-stage="${deal.stage}"
         onclick="openDetail(${idx})">
      <div class="card-name">${escHtml(deal.company_name || '')}</div>
      ${deal.founder_name ? `<div class="card-founder">${escHtml(deal.founder_name)}</div>` : ''}
      ${deal.description ? `<div class="card-desc">${escHtml(deal.description)}</div>` : ''}
      <div class="card-meta">
        ${vertical ? `<span class="badge ${badgeClass}">${verticalLabel(vertical)}</span>` : ''}
        ${cohortBadge}
        <span class="card-date">${dateStr}</span>
        ${deckIcon}
      </div>
    </div>
  `;
}

function formatDate(s) {
  if (!s) return '';
  try {
    const d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' });
  } catch { return s; }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ---- DRAG AND DROP ----
function onDragStart(e) {
  const card = e.currentTarget;
  dragSrcIndex = parseInt(card.dataset.index);
  dragSrcStage = card.dataset.stage;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcIndex);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, targetStage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcIndex === null || dragSrcStage === targetStage) return;
  // Update deal stage in local data
  const deal = allDeals.find(d => d._index === dragSrcIndex);
  if (deal) {
    deal.stage = targetStage;
    renderStats();
    applyFilters();
  }
  dragSrcIndex = null;
  dragSrcStage = null;
}

// ---- DETAIL MODAL ----
function findDealByIndex(idx) {
  return allDeals.find(d => d._index === idx) || null;
}

function openDetail(idx) {
  const deal = findDealByIndex(idx);
  if (!deal) return;
  currentDeal = deal;
  currentIndex = idx;

  document.getElementById('dm-name').textContent = deal.company_name || '';
  document.getElementById('dm-founder').textContent =
    [deal.founder_name, deal.founder_email].filter(Boolean).join(' · ');

  const stageSelect = document.getElementById('dm-stage');
  stageSelect.innerHTML = STAGES.map(s =>
    `<option value="${s}" ${s === deal.stage ? 'selected' : ''}>${s}</option>`
  ).join('');

  document.getElementById('dm-vertical').textContent = verticalLabel(deal.vertical || '');
  document.getElementById('dm-location').textContent = deal.location || '—';
  document.getElementById('dm-cohort').textContent = deal.cohort || '—';
  document.getElementById('dm-date').textContent = deal.date_added ? formatDate(deal.date_added) : '—';
  document.getElementById('dm-source').textContent = deal.source || '—';
  document.getElementById('dm-desc').textContent = deal.description || '—';

  const raiseEl = document.getElementById('dm-raise');
  const raiseLabel = document.getElementById('dm-raise-label');
  if (deal.raise) {
    raiseEl.textContent = deal.raise;
    raiseEl.style.display = ''; raiseLabel.style.display = '';
  } else {
    raiseEl.style.display = 'none'; raiseLabel.style.display = 'none';
  }

  const linksEl = document.getElementById('dm-links');
  const linksLabel = document.getElementById('dm-links-label');
  const links = [];
  if (deal.deck_url) links.push(`<a href="${deal.deck_url}" target="_blank">&#128196; View Deck</a>`);
  if (deal.linkedin) links.push(`<a href="${deal.linkedin}" target="_blank">&#128101; LinkedIn</a>`);
  if (links.length) {
    linksEl.innerHTML = links.join(' &nbsp;&#183;&nbsp; ');
    linksEl.style.display = ''; linksLabel.style.display = '';
  } else {
    linksEl.style.display = 'none'; linksLabel.style.display = 'none';
  }

  document.getElementById('dm-notes').value = deal.notes || '';
  document.getElementById('dm-last-contact').value = deal.last_contact || '';

  const log = deal.contact_log || [];
  const logEl = document.getElementById('dm-log');
  const logSection = document.getElementById('dm-log-section');
  if (log.length) {
    logEl.innerHTML = log.map(entry =>
      `<li><span class="log-date">${entry.date || ''}</span><span>${escHtml(entry.note || '')}</span></li>`
    ).join('');
    logSection.style.display = '';
  } else {
    logSection.style.display = 'none';
  }

  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  currentDeal = null;
  currentIndex = null;
}

function closeDetailIfBg(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
}

function onStageChange() {
  if (currentIndex === null) return;
  const newStage = document.getElementById('dm-stage').value;
  const deal = findDealByIndex(currentIndex);
  if (deal) {
    deal.stage = newStage;
    renderStats();
    applyFilters();
  }
}

function saveNotes() {
  if (currentIndex === null) return;
  const deal = findDealByIndex(currentIndex);
  if (deal) {
    deal.notes = document.getElementById('dm-notes').value;
    flashSaved('si-notes');
  }
}

function saveLastContact() {
  if (currentIndex === null) return;
  const deal = findDealByIndex(currentIndex);
  if (deal) {
    const lc = document.getElementById('dm-last-contact').value;
    deal.last_contact = lc;
    if (lc) {
      deal.contact_log = deal.contact_log || [];
      deal.contact_log.push({ date: lc, note: 'Contact recorded' });
    }
    flashSaved('si-contact');
  }
}

function flashSaved(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ---- ADD DEAL MODAL ----
function openAddModal() {
  ['f-name','f-founder','f-email','f-desc','f-cohort','f-location','f-source','f-deck','f-linkedin','f-raise'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-stage').value = 'Pipeline';
  document.getElementById('f-vertical').value = '';
  document.getElementById('addOverlay').classList.add('active');
}

function closeAdd() {
  document.getElementById('addOverlay').classList.remove('active');
}

function closeAddIfBg(e) {
  if (e.target === document.getElementById('addOverlay')) closeAdd();
}

function submitAddDeal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Company name is required.'); return; }

  const deal = {
    _index: allDeals.length,
    company_name: name,
    founder_name: document.getElementById('f-founder').value.trim() || null,
    founder_email: document.getElementById('f-email').value.trim() || null,
    description: document.getElementById('f-desc').value.trim() || null,
    vertical: document.getElementById('f-vertical').value || null,
    stage: document.getElementById('f-stage').value,
    cohort: document.getElementById('f-cohort').value.trim() || null,
    location: document.getElementById('f-location').value.trim() || null,
    source: document.getElementById('f-source').value.trim() || null,
    deck_url: document.getElementById('f-deck').value.trim() || null,
    linkedin: document.getElementById('f-linkedin').value.trim() || null,
    raise: document.getElementById('f-raise').value.trim() || null,
    date_added: new Date().toISOString().slice(0,10),
    notes: '',
    last_contact: '',
    contact_log: [],
  };

  allDeals.push(deal);
  closeAdd();
  renderStats();
  applyFilters();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeAdd(); }
});

init();
</script>
</body>
</html>
